<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI App Compiler</title>

    <link rel="stylesheet" href="../css/main.css">

</head>

<body>

    <div class="login-container">

        <div class="login-card">

            <h1>AI App Compiler</h1>

            <p class="subtitle">
                Build production-ready applications using AI
            </p>

            <input
                type="text"
                id="username"
                placeholder="Username"
            >

            <input
                type="email"
                id="email"
                placeholder="Email"
            >

            <input
                type="password"
                id="password"
                placeholder="Password"
            >

            <button onclick="login()">
                Login
            </button>

        </div>

    </div>

    <script src="../js/auth.js"></script>

</body>

</html>
